<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Gallery index. Distinct from any individual deck's aesthetic by
     design: light-first, geometric sans display, hairline rules, a
     graphite-and-warm-ivory dark mode with an orange accent so the two
     artifacts never read as neighbors. */
  :root {
    --bg: #ffffff;
    --surface: #f6f6f4;
    --rule: rgba(17, 17, 17, 0.1);
    --rule-bright: rgba(17, 17, 17, 0.26);
    --text: #111111;
    --text-dim: #5a5a5a;
    --text-muted: #767676;          /* 4.54:1 on white — WCAG AA */
    --accent: #0055ff;
    --accent-on-accent: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1e;                /* graphite, not near-black */
      --surface: #23232a;
      --rule: rgba(244, 239, 230, 0.12);
      --rule-bright: rgba(244, 239, 230, 0.3);
      --text: #f4efe6;              /* warm ivory */
      --text-dim: #a8a196;
      --text-muted: #928c82;        /* 5.2:1 on graphite */
      --accent: #ff6b35;            /* hot orange, maximum hue distance from deck green */
      --accent-on-accent: #1a1a1e;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100dvh; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* Skip link for keyboard users */
  .skip-link {
    position: absolute; left: -9999px; top: auto;
    width: 1px; height: 1px; overflow: hidden;
  }
  .skip-link:focus {
    position: fixed; top: 12px; left: 12px;
    width: auto; height: auto;
    padding: 10px 14px;
    background: var(--accent); color: var(--accent-on-accent);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    letter-spacing: 0.5px; text-decoration: none;
    z-index: 1000; border-radius: 2px;
  }

  /* Two-column editorial layout. Sticky meta on the left keeps the
     masthead visible while the right index scrolls. */
  .page {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 2fr);
    gap: clamp(40px, 6vw, 120px);
    padding: clamp(48px, 9vh, 120px) clamp(32px, 7vw, 112px);
    max-width: 1560px;
    margin: 0 auto;
    min-height: 100dvh;
  }
  .page > * { min-width: 0; }

  aside.meta {
    position: sticky;
    top: clamp(48px, 9vh, 120px);
    align-self: start;
    /* Safety valve: if the sidebar ever overflows the viewport, let it
       scroll internally instead of hiding content below the fold. */
    max-height: calc(100dvh - clamp(96px, 18vh, 240px));
    overflow-y: auto;
    scrollbar-width: thin;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  aside.meta::-webkit-scrollbar { width: 4px; }
  aside.meta::-webkit-scrollbar-thumb { background: var(--rule-bright); border-radius: 2px; }

  /* Breadcrumb IS the source link. One canonical pointer at the repo. */
  a.breadcrumb {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    text-decoration: none;
    padding-bottom: 1px;
    border-bottom: 1px solid transparent;
    align-self: flex-start;
    transition: color 0.15s ease, border-color 0.15s ease;
    /* Pulls the running-head up so its border-top lands on the exact same
       Y as the list-head's border-bottom on the right column. The value
       accounts for the breadcrumb's 2px of invisible padding+transparent-
       border (reserved so the hover underline appears without shifting
       layout) plus the 10px needed to match the 18px right-column gap. */
    margin-bottom: -12px;
  }
  a.breadcrumb:hover,
  a.breadcrumb:focus-visible {
    color: var(--text);
    border-bottom-color: var(--text);
    outline: none;
  }

  /* Silent horizontal rule that visually anchors against the list-head's
     border-bottom on the right column. Same Y, same weight. No label. */
  hr.divider {
    height: 0;
    margin: 0;
    border: none;
    border-top: 1px solid var(--rule-bright);
  }

  h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(44px, 5.5vw, 96px);
    font-weight: 500;
    letter-spacing: -0.055em;
    line-height: 0.95;
    color: var(--text);
    text-wrap: balance;
    overflow-wrap: anywhere;
  }

  .subtitle {
    font-size: clamp(15px, 1.2vw, 17px);
    line-height: 1.55;
    color: var(--text-dim);
    max-width: 34ch;
  }

  /* Right column */
  main { min-width: 0; }
  .list-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule-bright);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  ul { list-style: none; }
  .deck-row {
    border-bottom: 1px solid var(--rule);
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .deck-row { animation: none !important; opacity: 1 !important; transform: none !important; }
  }

  a.deck {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: baseline;
    column-gap: clamp(20px, 3vw, 36px);
    padding: clamp(22px, 3vh, 34px) 4px;
    text-decoration: none;
    color: var(--text);
    transition: color 0.2s ease;
    position: relative;
  }
  a.deck:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
    border-radius: 2px;
  }
  a.deck .num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    align-self: baseline;
  }
  a.deck .title {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(20px, 2.1vw, 28px);
    font-weight: 500;
    letter-spacing: -0.6px;
    line-height: 1.2;
    text-wrap: balance;
    transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), color 0.2s ease;
  }
  a.deck .arrow {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-muted);
    font-size: 14px;
    transition: color 0.2s ease, transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
  }
  /* Only the title and arrow move on interaction. Number stays pinned. */
  a.deck:hover .title,
  a.deck:focus-visible .title {
    transform: translateX(clamp(6px, 1.2vw, 14px));
    color: var(--accent);
  }
  a.deck:hover .arrow,
  a.deck:focus-visible .arrow {
    color: var(--accent);
    transform: translateX(10px);
  }

  .state {
    padding: clamp(44px, 10vh, 80px) 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .state .retry {
    font-family: inherit; font-size: inherit;
    margin-left: 8px;
    background: transparent;
    border: 1px solid var(--rule-bright);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .state .retry:hover,
  .state .retry:focus-visible {
    color: var(--accent);
    border-color: var(--accent);
    outline: none;
  }

  /* Editorial end-mark. A tiny accent-colored diamond terminates the
     list the way a print article uses ◼ or ▪ — no label, just a mark. */
  .list-foot {
    padding-top: clamp(32px, 6vh, 56px);
    display: flex;
    justify-content: center;
  }
  .list-foot::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    transform: rotate(45deg);
  }

  @media (max-width: 1024px) {
    .page {
      grid-template-columns: 1fr;
      gap: clamp(32px, 6vh, 56px);
      padding: clamp(32px, 5vh, 56px) clamp(24px, 6vw, 48px);
    }
    aside.meta {
      position: static;
      max-height: none;
      overflow-y: visible;
    }
    h1 { font-size: clamp(40px, 9vw, 72px); letter-spacing: -0.045em; }
    a.deck .title { font-size: clamp(18px, 4vw, 24px); }
  }
  @media (max-width: 480px) {
    h1 { font-size: clamp(36px, 10vw, 48px); }
  }
</style>
</head>
<body>

<a href="#deck-list" class="skip-link">Skip to index</a>

<div class="page">

  <aside class="meta">
    <a class="breadcrumb" href="https://github.com/c-miles/field-notes" target="_blank" rel="noopener">c-miles / field-notes</a>
    <hr class="divider" aria-hidden="true">
    <h1>Field Notes</h1>
    <p class="subtitle">HTML slide decks, diagrams, and visual explainers meant to drop into a pull request or design doc. Each entry is a standalone page.</p>
  </aside>

  <main aria-labelledby="index-heading">
    <div class="list-head">
      <span id="index-heading">Index</span>
      <span id="list-head-right" aria-live="polite">&mdash;</span>
    </div>
    <ul id="deck-list" aria-labelledby="index-heading">
      <li class="state">Loading index</li>
    </ul>
    <div class="list-foot" id="list-foot" hidden aria-hidden="true"></div>
  </main>

</div>

<script>
  // Pulls the repo contents from GitHub's API and lists every .html file
  // except this index itself. Adding a new deck is a matter of pushing the
  // file; no edits to index.html needed.
  const list = document.getElementById('deck-list')
  const headRight = document.getElementById('list-head-right')
  const listFoot = document.getElementById('list-foot')
  const CACHE_KEY = 've-decks-cache-v1'

  const humanize = (filename) => {
    const base = filename.replace(/\.html$/i, '')
    const parts = base.split(/[-_]+/).filter(Boolean)
    return parts
      .map((word, i) => {
        if (/^[A-Z0-9]{2,}$/.test(word)) return word
        if (/^\d+$/.test(word)) return word
        // Ticket prefix: 2-4 letter word followed by a pure-digit word
        const next = parts[i + 1]
        if (/^[a-z]{2,4}$/i.test(word) && next && /^\d+$/.test(next)) {
          return word.toUpperCase()
        }
        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
      })
      .join(' ')
  }

  const pad = (n) => String(n).padStart(2, '0')

  const renderDecks = (decks) => {
    headRight.textContent = decks.length + (decks.length === 1 ? ' entry' : ' entries')

    list.innerHTML = ''
    if (decks.length === 0) {
      list.innerHTML = '<li class="state">No decks yet. Push an HTML file to this repo and it will appear here.</li>'
      listFoot.hidden = true
      return
    }

    decks.forEach((f, i) => {
      const li = document.createElement('li')
      li.className = 'deck-row'
      // Cap the stagger so a large list doesn't fire a 40-row cascade.
      if (i < 8) li.style.animationDelay = (0.08 + i * 0.06) + 's'
      else { li.style.animation = 'none'; li.style.opacity = '1'; li.style.transform = 'none' }

      const a = document.createElement('a')
      a.className = 'deck'
      a.href = f.name
      a.target = '_blank'
      a.rel = 'noopener'
      a.innerHTML =
        '<span class="num" aria-hidden="true">' + pad(i + 1) + '</span>' +
        '<span class="title">' + humanize(f.name) + '</span>' +
        '<span class="arrow" aria-hidden="true">&rarr;</span>'
      li.appendChild(a)
      list.appendChild(li)
    })
    listFoot.hidden = false
  }

  const showError = (message) => {
    headRight.textContent = 'error'
    list.innerHTML =
      '<li class="state">Could not reach the GitHub API (' + message + '). ' +
      '<button type="button" class="retry" onclick="location.reload()">Retry</button></li>'
    listFoot.hidden = true
  }

  fetch('https://api.github.com/repos/c-miles/field-notes/contents/')
    .then((r) => {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText)
      return r.json()
    })
    .then((files) => {
      const decks = files
        .filter((f) => f.type === 'file' && /\.html$/i.test(f.name) && f.name.toLowerCase() !== 'index.html')
        .sort((a, b) => b.name.localeCompare(a.name))
        .map((f) => ({name: f.name}))
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(decks)) } catch (_) {}
      renderDecks(decks)
    })
    .catch((err) => {
      // Fall back to cached list if the live fetch fails (e.g. API rate limit).
      try {
        const cached = localStorage.getItem(CACHE_KEY)
        if (cached) {
          const decks = JSON.parse(cached)
          renderDecks(decks)
          const note = document.createElement('li')
          note.className = 'state'
          note.innerHTML = 'Showing cached index &mdash; live fetch failed (' + err.message + ').'
          list.prepend(note)
          return
        }
      } catch (_) {}
      showError(err.message)
    })
</script>

</body>
</html>
